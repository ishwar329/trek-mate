<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Trek - TrekMate</title>
    <link rel="stylesheet" href="css/booking.css">
</head>
<body>

<div class="booking-container">

    <div class="booking-card">

        <h1>🌄 Trek Booking</h1>
        <p>Book your next adventure with TrekMate</p>

        <form>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">

            <label>Email</label>
            <input type="email" placeholder="Enter your email">

            <label>Select Trek</label>
            <select>
                <option>Rajgad Fort Trek</option>
                <option>Torna Fort Trek</option>
                <option>Kalsubai Peak Trek</option>
                <option>Harishchandragad Trek</option>
                <option>Lohagad Trek</option>
            </select>

            <label>Number of Persons</label>
            <input type="number" min="1" placeholder="Enter persons">

            <label>Trek Date</label>
            <input type="date">

            <button type="submit">
                Book Now
            </button>

        </form>

    </div>

</div>

</body>
</html>
