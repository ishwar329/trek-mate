<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - TrekMate</title>
    <link rel="stylesheet" href="css/gallery.css">
</head>
<body>

<header>
    <h1>🌄 TrekMate Gallery</h1>
    <p>Memories from our adventures</p>
</header>

<section class="gallery-container">

    <div class="gallery-card">
        <img src="images/rajgad.jpg" alt="Rajgad Trek">
        <div class="overlay">
            <h3>Rajgad Trek</h3>
        </div>
    </div>

    <div class="gallery-card">
        <img src="images/torna.jpg" alt="Torna Trek">
        <div class="overlay">
            <h3>Torna Trek</h3>
        </div>
    </div>

    <div class="gallery-card">
        <img src="images/kalsubai.jpg" alt="Kalsubai Trek">
        <div class="overlay">
            <h3>Kalsubai Trek</h3>
        </div>
    </div>

    <div class="gallery-card">
        <img src="images/harishchandragad.jpg" alt="Harishchandragad Trek">
        <div class="overlay">
            <h3>Harishchandragad</h3>
        </div>
    </div>

    <div class="gallery-card">
        <img src="images/lohagad.jpg" alt="Lohagad Trek">
        <div class="overlay">
            <h3>Lohagad Trek</h3>
        </div>
    </div>

    <div class="gallery-card">
        <img src="images/visapur.jpg" alt="Visapur Trek">
        <div class="overlay">
            <h3>Visapur Trek</h3>
        </div>
    </div>

</section>

</body>
</html>
