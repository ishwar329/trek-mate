<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - TrekMate</title>
    <link rel="stylesheet" href="css/my-bookings.css">
</head>
<body>

<header class="header">
    <h1>🌄 My Bookings</h1>
    <p>Manage your upcoming adventures</p>
</header>

<section class="booking-list">

    <div class="booking-card">

        <div class="left">
            <h2>Rajgad Fort Trek</h2>
            <p>📍 Pune, Maharashtra</p>
            <p>📅 20 July 2026</p>
            <p>👥 2 Persons</p>
        </div>

        <div class="right">
            <span class="status confirmed">
                Confirmed
            </span>

            <button class="view-btn">
                View Details
            </button>

            <button class="cancel-btn">
                Cancel Booking
            </button>
        </div>

    </div>

    <div class="booking-card">

        <div class="left">
            <h2>Kalsubai Peak Trek</h2>
            <p>📍 Nashik, Maharashtra</p>
            <p>📅 10 August 2026</p>
            <p>👥 1 Person</p>
        </div>

        <div class="right">
            <span class="status pending">
                Pending
            </span>

            <button class="view-btn">
                View Details
            </button>

            <button class="cancel-btn">
                Cancel Booking
            </button>
        </div>

    </div>

</section>

</body>
</html>
