<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TrekMate</title>
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>

<section class="contact-section">

    <div class="contact-container">

        <div class="contact-info">
            <h1>🌄 Contact TrekMate</h1>

            <p>
                Have questions about our treks?
                Get in touch with us.
            </p>

            <div class="info-box">
                <h3>📍 Address</h3>
                <p>Pune, Maharashtra, India</p>
            </div>

            <div class="info-box">
                <h3>📞 Phone</h3>
                <p>+91 xxxxxxxxx</p>
            </div>

            <div class="info-box">
                <h3>📧 Email</h3>
                <p>info@trekmate.com</p>
            </div>

        </div>

        <div class="contact-form">

            <h2>Send Message</h2>

            <form>

                <input
                    type="text"
                    placeholder="Your Name"
                    required
                >

                <input
                    type="email"
                    placeholder="Your Email"
                    required
                >

                <input
                    type="text"
                    placeholder="Subject"
                    required
                >

                <textarea
                    placeholder="Your Message"
                    rows="6"
                    required>
                </textarea>

                <button type="submit">
                    Send Message
                </button>

            </form>

        </div>

    </div>

</section>

</body>
</html>
