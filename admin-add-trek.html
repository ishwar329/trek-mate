<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Trek</title>
    <link rel="stylesheet" href="css/admin-add-trek.css">
</head>
<body>

<div class="container">

    <div class="form-box">

        <h1>🌄 Add New Trek</h1>
        <p>Create and manage trekking events</p>

        <form>

            <label>Trek Name</label>
            <input type="text"
                   placeholder="Enter trek name">

            <label>Location</label>
            <input type="text"
                   placeholder="Enter location">

            <label>Price (₹)</label>
            <input type="number"
                   placeholder="Enter price">

            <label>Duration</label>
            <input type="text"
                   placeholder="1 Day / 2 Days">

            <label>Difficulty</label>
            <select>
                <option>Easy</option>
                <option>Moderate</option>
                <option>Hard</option>
            </select>

            <label>Trek Image</label>
            <input type="file">

            <label>Description</label>
            <textarea
                rows="6"
                placeholder="Enter trek description">
            </textarea>

            <button type="submit">
                Add Trek
            </button>

        </form>

    </div>

</div>

</body>
</html>
